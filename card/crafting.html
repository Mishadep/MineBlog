<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MineBlog - База Крафтов</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="crafting.css">
</head>
<body>
    <header class="header"><a href="../index.html">MINEBLOG</a></header>
    
    <div class="list-container">
        <h1 class="main-title">ПРЕДМЕТЫ ДЛЯ КРАФТА</h1>
        <div id="itemList">
            </div>
    </div>

    <script src="database.js"></script>
    <script>
        const listContainer = document.getElementById('itemList');
        const itemsArray = Object.keys(mc_database).map(id => ({ id, ...mc_database[id] }));

        function render() {
            const categories = [...new Set(itemsArray.map(i => i.category))];
            
            listContainer.innerHTML = categories.map(cat => `
                <h2 class="category-title">${cat.toUpperCase()}</h2>
                <div class="item-group">
                    ${itemsArray.filter(i => i.category === cat).map(item => `
                        <a href="item.html?id=${item.id}" class="item-link">${item.name.toUpperCase()}</a>
                    `).join('')}
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
